<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>81Okey | MasaKeyfi.org</title>
    <style>
        /* [cite: 1, 2] */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:#062033;color:#fff;overflow:hidden;touch-action:none;}
        
        #lobby { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; background: radial-gradient(circle at center, #1a4a6b, #062033); z-index: 500; }
        #game{display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1a4a6b,#062033);}
        
        /* [cite: 19-27] */
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px 20px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .masa-wrapper { position: relative; width: 220px; height: 220px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .masa-board { background: linear-gradient(135deg, #c0802c, #8e5812); width: 120px; height: 120px; border-radius: 20px; border: 4px solid #5a3508; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; }
        .masa-board span { color: #fff; font-weight: 900; font-size: 18px; text-shadow: 1px 1px 2px #000; }
        .oyna-btn { position: absolute; background: #0a2b42; border: 3px solid #e8c84a; color: #e8c84a; font-weight: 800; border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3; font-size: 12px; }
        
        /* [cite: 28-31] */
        #setup { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; backdrop-filter: blur(5px); }
        .setup-modal { background: #062033; border: 2px solid #e8c84a; border-radius: 16px; padding: 25px; width: 100%; max-width: 750px; position: relative; display: flex; flex-direction: column; gap: 20px; animation: modalPop 0.3s ease-out; }
        
        @keyframes modalPop { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        /* [cite: 35-43] */
        .cb { padding: 6px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer; transition: all 0.15s; }
        .cb.on { background: #e8c84a; border-color: #e8c84a; color: #1a1a00; font-weight: 700; box-shadow: 0 0 10px rgba(232,200,74,0.3); }
        .start-btn { background: #e8c84a; color: #1a1a00; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ghost"></div>

<div id="auth-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background: url('https://images.unsplash.com/photo-1611195974226-a6a9be9dd763?q=80&w=1920') no-repeat center center fixed; background-size: cover; z-index: 2000; padding: 20px;">
  <div style="position:absolute; inset:0; background:rgba(6, 32, 51, 0.85); backdrop-filter: blur(10px);"></div>
  <div style="position:relative; display:flex; width:100%; max-width:1000px; height:600px; background:rgba(10, 43, 66, 0.6); border:1px solid rgba(232, 200, 74, 0.3); border-radius:24px; box-shadow:0 40px 100px rgba(0,0,0,0.8); overflow:hidden; animation: modalPop 0.5s ease-out;">
    <div style="flex: 1; padding: 40px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);">
      <div style="text-align:center; margin-bottom: 30px;">
        <div style="font-size:42px; font-weight:950; color:#e8c84a; letter-spacing:3px;">MASAKEYFİ<span style="color:#fff">.ORG</span></div>
        <div style="font-size:12px; color:rgba(255,255,255,0.5); text-transform:uppercase;">Türkiye'nin Dijital Kıraathanesi</div>
      </div>
      <div id="auth-forms-container">
        <div style="display:flex; margin-bottom:20px; background:rgba(0,0,0,0.3); border-radius:12px; padding:4px;">
          <button id="tab-giris" onclick="switchAuthTab('giris')" style="flex:1; padding:10px; border:none; border-radius:10px; background:#e8c84a; color:#1a1a00; font-weight:800; cursor:pointer;">Giriş Yap</button>
          <button id="tab-kayit" onclick="switchAuthTab('kayit')" style="flex:1; padding:10px; border:none; border-radius:10px; background:transparent; color:#fff; font-weight:800; cursor:pointer;">Kayıt Ol</button>
        </div>
        <div id="auth-error" style="color:#ff6666; font-size:12px; text-align:center; margin-bottom:10px;"></div>
        <div id="auth-giris" style="display:flex; flex-direction:column; gap:12px;">
          <input id="giris-email" type="email" placeholder="E-posta Adresi" style="width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.1); outline:none;">
          <input id="giris-sifre" type="password" placeholder="Şifre" style="width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.1); outline:none;">
          <button onclick="doGiris()" style="padding:15px; background:linear-gradient(135deg, #e8c84a, #ffcc44); color:#1a1a00; border:none; border-radius:12px; font-weight:900; cursor:pointer;">OYUNA BAŞLA</button>
        </div>
        <div id="auth-kayit" style="display:none; flex-direction:column; gap:12px;">
          <input id="kayit-kullanici" type="text" placeholder="Kullanıcı Adı" style="width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.1); outline:none;">
          <input id="kayit-email" type="email" placeholder="E-posta" style="width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.1); outline:none;">
          <input id="kayit-sifre" type="password" placeholder="Şifre" style="width:100%; padding:14px; border-radius:12px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid rgba(255,255,255,0.1); outline:none;">
          <button onclick="doKayit()" style="padding:15px; background:#e8c84a; color:#1a1a00; border:none; border-radius:12px; font-weight:900; cursor:pointer;">ÜYELİĞİ TAMAMLA</button>
        </div>
      </div>
      <button onclick="doMisafir()" style="margin-top:20px; width:100%; padding:12px; background:rgba(255,255,255,0.05); color:#fff; border-radius:12px; cursor:pointer; border:1px solid rgba(255,255,255,0.1);">👤 Misafir Girişi</button>
    </div>
    <div style="flex: 1.2; background: rgba(0,0,0,0.4); padding: 30px; display: flex; flex-direction: column; gap: 20px;">
        <div style="color:#e8c84a; font-weight:800; text-transform:uppercase;">Aktif Oyunlar</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="background:linear-gradient(135deg, #c0802c, #8e5812); border-radius:16px; padding:20px; border:2px solid #e8c84a;">
                <div style="font-size:24px;">🀄</div><div style="font-weight:900;">81 OKEY</div>
            </div>
            <div style="background:rgba(255,255,255,0.03); border-radius:16px; padding:20px; border:2px dashed rgba(255,255,255,0.1); opacity:0.6;">
                <div style="font-size:24px;">🃏</div><div style="font-weight:900;">101 OKEY</div>
            </div>
        </div>
        <div style="flex:1; background:rgba(0,0,0,0.3); border-radius:16px; border:1px solid rgba(255,255,255,0.05);"></div>
    </div>
  </div>
</div>

<div id="lobby">
    <div id="user-dashboard-bar" style="background: linear-gradient(90deg, #0a2b42, #164363); border-bottom: 2px solid #e8c84a; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="user-avatar-container" style="position: relative;">
                <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ömer" style="width: 55px; height: 55px; border-radius: 50%; border: 2px solid #e8c84a; background: #000;">
                <div id="user-level-badge" style="position: absolute; bottom: -5px; right: -5px; background: #e8c84a; color: #1a1a00; font-weight: 900; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid #1a1a00;">LVL 1</div>
            </div>
            <div>
                <div id="header-username" style="font-weight: 800; font-size: 18px;">Misafir Oyuncu</div>
                <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                    <div style="width: 120px; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden;">
                        <div id="xp-progress-bar" style="width: 30%; height: 100%; background: linear-gradient(90deg, #e8c84a, #fff);"></div>
                    </div>
                    <span id="header-xp-text" style="font-size: 10px; opacity: 0.6;">300 / 1000 XP</span>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 25px; text-align: center;">
            <div><div style="font-size: 10px; opacity:0.5;">MAÇ</div><div id="stat-total" style="font-weight: 900; font-size: 18px;">0</div></div>
            <div><div style="font-size: 10px; opacity:0.5;">WİN</div><div id="stat-wins" style="font-weight: 900; color: #44ff44; font-size: 18px;">0</div></div>
            <div><div style="font-size: 10px; opacity:0.5;">ÇİP</div><div id="stat-coins" style="font-weight: 900; color: #e8c84a; font-size: 18px;">1.000</div></div>
        </div>
        <div id="header-actions" style="display: flex; gap: 10px; align-items: center;">
            <button onclick="showProfile()" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; cursor: pointer;">⚙️ Ayarlar</button>
            <button onclick="doLogout()" style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Çıkış</button>
        </div>
    </div>
    
    <div class="tables-grid" id="tables-grid"></div>
</div>

<div id="admin-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:4000; padding:30px; overflow-y:auto;">
    <div style="max-width:900px; margin:0 auto; background:#0a2b42; border:2px solid #e8c84a; border-radius:20px; padding:25px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px;">
            <h2 style="color:#e8c84a; font-weight:900;">👑 PATRON PANELİ</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">×</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; text-align:center;">
                <div style="font-size:12px; opacity:0.6;">TOPLAM OYUNCU</div>
                <div id="admin-total-users" style="font-size:24px; font-weight:800; color:#e8c84a;">...</div>
            </div>
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; text-align:center;">
                <div style="font-size:12px; opacity:0.6;">AKTİF MASALAR</div>
                <div id="admin-active-tables" style="font-size:24px; font-weight:800; color:#44ff44;">...</div>
            </div>
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; text-align:center;">
                <div style="font-size:12px; opacity:0.6;">TOPLAM ÇİP</div>
                <div id="admin-total-coins" style="font-size:24px; font-weight:800; color:#ffcc44;">...</div>
            </div>
        </div>
    </div>
</div>

<div id="game">
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="src/config.js"></script>
<script src="src/supabaseClient.js"></script>
<script src="src/state.js"></script>
<script src="src/utils.js"></script>
<script src="src/gameState.js"></script>
<script src="src/auth.js"></script>
<script src="src/ui.js"></script>
<script src="src/gameLogic.js"></script>
<script src="src/bot.js"></script>
<script src="src/multiplayer.js"></script>
<script src="src/main.js"></script>

</body>
</html>
