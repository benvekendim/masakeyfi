<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>81Okey | MasaKeyfi.org</title>
    <style>
        /* Önceki stillerinin tamamı burada korunuyor */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:#062033;color:#fff;overflow:hidden;touch-action:none;}
        #lobby { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; background: radial-gradient(circle at center, #1a4a6b, #062033); z-index: 500; }
        /* ... (Diğer stillerini buraya ekleyebilirsin, temizlik için kısalttım) ... */
        
        @keyframes modalPop { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    </style>
</head>
<body>
<div id="ghost"></div>

<div id="auth-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background: url('https://images.unsplash.com/photo-1611195974226-a6a9be9dd763?q=80&w=1920') no-repeat center center fixed; background-size: cover; z-index: 2000; padding: 20px;">
  <div style="position:absolute; inset:0; background:rgba(6, 32, 51, 0.85); backdrop-filter: blur(10px);"></div>
  <div style="position:relative; display:flex; width:100%; max-width:1000px; height:600px; background:rgba(10, 43, 66, 0.6); border:1px solid rgba(232, 200, 74, 0.3); border-radius:24px; box-shadow:0 40px 100px rgba(0,0,0,0.8); overflow:hidden; animation: modalPop 0.5s ease-out;">
    <div style="flex: 1; padding: 40px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);">
      <div style="text-align:center; margin-bottom: 30px;">
        <div style="font-size:42px; font-weight:950; color:#e8c84a; letter-spacing:3px; text-shadow: 0 0 20px rgba(232,200,74,0.4);">MASAKEYFİ<span style="color:#fff">.ORG</span></div>
        <div style="font-size:12px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:2px;">Türkiye'nin Dijital Kıraathanesi</div>
      </div>
      <div id="auth-forms-container" style="flex:1;">
        <div style="display:flex; margin-bottom:20px; background:rgba(0,0,0,0.3); border-radius:12px; padding:4px;">
          <button id="tab-giris" onclick="switchAuthTab('giris')" style="flex:1; padding:10px; border:none; border-radius:10px; background:#e8c84a; color:#1a1a00; font-weight:800; cursor:pointer;">Giriş Yap</button>
          <button id="tab-kayit" onclick="switchAuthTab('kayit')" style="flex:1; padding:10px; border:none; border-radius:10px; background:transparent; color:#fff; font-weight:800; cursor:pointer;">Kayıt Ol</button>
        </div>
        <div id="auth-error" style="color:#ff6666; font-size:12px; text-align:center; margin-bottom:10px; min-height:16px;"></div>
        <div id="auth-giris">
          <input id="giris-email" type="email" placeholder="E-posta Adresi" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; outline:none; margin-bottom:10px;">
          <input id="giris-sifre" type="password" placeholder="Şifre" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; outline:none; margin-bottom:15px;">
          <button onclick="doGiris()" style="width:100%; padding:15px; background:linear-gradient(135deg, #e8c84a, #ffcc44); color:#1a1a00; border:none; border-radius:12px; font-size:16px; font-weight:900; cursor:pointer;">OYUNA BAŞLA</button>
        </div>
        <div id="auth-kayit" style="display:none;">
          <input id="kayit-kullanici" type="text" placeholder="Kullanıcı Adı" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; outline:none; margin-bottom:10px;">
          <input id="kayit-email" type="email" placeholder="E-posta Adresi" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; outline:none; margin-bottom:10px;">
          <input id="kayit-sifre" type="password" placeholder="Şifre" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; outline:none; margin-bottom:15px;">
          <button onclick="doKayit()" style="width:100%; padding:15px; background:#e8c84a; color:#1a1a00; border:none; border-radius:12px; font-size:16px; font-weight:900; cursor:pointer;">ÜYELİĞİ TAMAMLA</button>
        </div>
      </div>
      <button onclick="doMisafir()" style="width:100%; margin-top:10px; padding:12px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:12px; cursor:pointer;">👤 Misafir Girişi</button>
    </div>
    <div style="flex: 1.2; background: rgba(0,0,0,0.4); padding: 30px; display: flex; flex-direction: column; gap: 20px;">
      <div style="color:#e8c84a; font-weight:800; font-size:14px; text-transform:uppercase;">Aktif Oyunlar</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div style="background:linear-gradient(135deg, #c0802c, #8e5812); border-radius:16px; padding:20px; border:2px solid #e8c84a;">
          <div style="font-size:24px;">🀄</div><div style="font-weight:900;">81 OKEY</div>
        </div>
        <div style="background:rgba(255,255,255,0.03); border-radius:16px; padding:20px; border:2px dashed rgba(255,255,255,0.1); opacity:0.6;">
          <div style="font-size:24px;">🃏</div><div style="font-weight:900;">101 OKEY</div>
        </div>
      </div>
      <div style="flex:1; background:rgba(0,0,0,0.3); border-radius:16px; display:flex; flex-direction:column; border:1px solid rgba(255,255,255,0.05);">
        <div style="padding:10px 15px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:12px; font-weight:700; color:rgba(255,255,255,0.5);">🌍 GENEL SOHBET</div>
        <div id="global-chat-messages" style="flex:1; padding:10px; overflow-y:auto; font-size:12px;"></div>
      </div>
    </div>
  </div>
</div>

<div id="lobby">
    <div id="user-dashboard-bar" style="background: linear-gradient(90deg, #0a2b42, #164363); border-bottom: 2px solid #e8c84a; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="user-avatar-container" style="position: relative;">
                <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ömer" style="width: 55px; height: 55px; border-radius: 50%; border: 2px solid #e8c84a; background: #000;">
                <div id="user-level-badge" style="position: absolute; bottom: -5px; right: -5px; background: #e8c84a; color: #1a1a00; font-weight: 900; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid #1a1a00;">LVL 1</div>
            </div>
            <div>
                <div id="header-username" style="font-weight: 800; font-size: 18px; color: #fff;">Misafir Oyuncu</div>
                <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                    <div style="width: 120px; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                        <div id="xp-progress-bar" style="width: 30%; height: 100%; background: linear-gradient(90deg, #e8c84a, #fff); box-shadow: 0 0 10px rgba(232,200,74,0.5);"></div>
                    </div>
                    <span id="header-xp-text" style="font-size: 10px; color: rgba(255,255,255,0.6); font-weight: bold;">300 / 1000 XP</span>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 25px; text-align: center;">
            <div><div style="font-size: 10px; opacity:0.5;">TOPLAM MAÇ</div><div id="stat-total" style="font-weight: 900; font-size: 18px;">0</div></div>
            <div><div style="font-size: 10px; opacity:0.5;">GALİBİYET</div><div id="stat-wins" style="font-weight: 900; color: #44ff44; font-size: 18px;">0</div></div>
            <div><div style="font-size: 10px; opacity:0.5;">ÇİPLER</div><div id="stat-coins" style="font-weight: 900; color: #e8c84a; font-size: 18px;">1.000</div></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="showProfile()" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; cursor: pointer;">⚙️ Ayarlar</button>
            <button onclick="doLogout()" style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Çıkış</button>
        </div>
    </div>
    <div class="tables-grid" id="tables-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="src/config.js"></script>
<script src="src/supabaseClient.js"></script>
<script src="src/state.js"></script>
<script src="src/utils.js"></script>
<script src="src/gameState.js"></script>
<script src="src/auth.js"></script>
<script src="src/ui.js"></script>
<script src="src/gameLogic.js"></script>
<script src="src/bot.js"></script>
<script src="src/multiplayer.js"></script>
<script src="src/main.js"></script>

</body>
</html>
